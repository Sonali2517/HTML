<!DOCTYPE html>
<html>
<head>
    <title>Complete Table Example</title>
</head>

<body>

<center>

<h2>Student Report Card</h2>

<table border="2"
       cellpadding="10"
       cellspacing="5"
       width="80%"
       height="300"
       align="center">

<caption><b>Student Details</b></caption>

<thead bgcolor="lightblue">

<tr>
<th rowspan="2">Roll No</th>
<th rowspan="2">Name</th>
<th colspan="3">Marks</th>
<th rowspan="2">Total</th>
<th rowspan="2">Grade</th>
</tr>

<tr>
<th>HTML</th>
<th>CSS</th>
<th>JavaScript</th>
</tr>

</thead>

<tbody align="center">

<tr bgcolor="lightyellow">
<td>101</td>
<td>Sonali</td>
<td>90</td>
<td>95</td>
<td>92</td>
<td>277</td>
<td>A+</td>
</tr>

<tr>
<td>102</td>
<td>Rahul</td>
<td>80</td>
<td>85</td>
<td>88</td>
<td>253</td>
<td>A</td>
</tr>

<tr bgcolor="lightyellow">
<td>103</td>
<td>Priya</td>
<td>75</td>
<td>82</td>
<td>79</td>
<td>236</td>
<td>B+</td>
</tr>

</tbody>

<tfoot bgcolor="lightgreen">

<tr>

<td colspan="5" align="right">
<b>Highest Total</b>
</td>

<td>277</td>

<td>A+</td>

</tr>

</tfoot>

</table>

</center>

</body>
</html>
